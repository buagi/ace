name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n (syntax) — hard gate
        run: |
          rc=0
          for f in ace lib/*.sh tests/*.sh; do bash -n "$f" || { echo "::error::syntax: $f"; rc=1; }; done
          exit $rc
      - name: shellcheck (errors fail; warnings informational)
        run: |
          sudo apt-get update -y && sudo apt-get install -y shellcheck
          echo "== errors (gate) =="
          shellcheck -S error -e SC1090,SC1091 ace lib/*.sh tests/*.sh
          echo "== warnings (informational) =="
          shellcheck -S warning -e SC1090,SC1091 ace lib/*.sh tests/*.sh || true
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: profile reader
        run: bash tests/profile-reader.sh
      - name: generator snapshots must be current
        run: bash tests/snapshot-generators.sh
      - name: supply-chain guard (no unpinned/unverified installs)
        run: bash tests/supply-chain.sh
