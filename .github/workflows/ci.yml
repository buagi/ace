name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # scripts/*.sh was outside every lint glob until now — bash-traps.sh scans it, so the cheaper gates
      # should too. Verified clean at both bash -n and shellcheck -S error before widening.
      - name: bash -n (syntax) — hard gate
        run: |
          rc=0
          for f in ace lib/*.sh tests/*.sh scripts/*.sh; do bash -n "$f" || { echo "::error::syntax: $f"; rc=1; }; done
          exit $rc
      # Static gate for the bash traps from the 2026-07-18 audit (A1-A11). Lives in `lint` rather than
      # `tests` because it needs nothing but bash/grep/awk/sed — fastest feedback, and a trap caught here
      # never reaches the suites below. HARD GATE: no `|| true`, no continue-on-error. It self-tests every
      # pattern against known-bad and known-good fixtures on each run, so a detector that silently stops
      # matching turns CI red rather than reporting clean.
      # 7 of the traps are statically enforced (A1 A2 A4 A5 A6 A8 A11). A3/A7/A9/A10/A12/A13 are not
      # machine-checkable at acceptable precision and are enforced by review only — a green tick here is
      # NOT clearance for the whole A-list.
      - name: bash traps (A1·A2·A4·A5·A6·A8·A11 static gate + its own self-test) — hard gate
        run: bash tests/bash-traps.sh
      - name: shellcheck (errors fail; warnings informational)
        run: |
          sudo apt-get update -y && sudo apt-get install -y shellcheck
          echo "== errors (gate) =="
          shellcheck -S error -e SC1090,SC1091 ace lib/*.sh tests/*.sh scripts/*.sh
          echo "== warnings (informational) =="
          shellcheck -S warning -e SC1090,SC1091 ace lib/*.sh tests/*.sh scripts/*.sh || true
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: profile reader
        run: bash tests/profile-reader.sh
      - name: generator snapshots must be current
        run: bash tests/snapshot-generators.sh
      - name: supply-chain guard (no unpinned/unverified installs)
        run: bash tests/supply-chain.sh
      - name: prompt contracts (agent output-contract regression gate — F3)
        run: bash tests/prompt-contracts.sh
      - name: swarm selftests (claim store · leasing · fencing · plan-lint · RED-main)
        run: bash tests/swarm-selftests.sh
      - name: merge-approval gate (deny-by-default · undelivered request · token uniqueness)
        run: bash tests/approval-selftest.sh
      - name: CLI dispatch ↔ help agreement
        run: bash tests/cli-dispatch-selftest.sh
      - name: autoloop lifecycle (provider-cap detection · step budget · resume never commits to main)
        run: bash tests/autoloop-selftest.sh
      # The B5 stop-order guarantee: TERM the loop leaders BEFORE killing their opencode trees, or in-flight
      # WIP is lost while the stop message still claims it was preserved. Pinned by intercepting the SENDS.
      - name: swarm stop signal ORDER (B5 — leaders TERMed before opencode trees)
        run: bash tests/killorder-selftest.sh
      # The research backend must track reality at run start, and must never fall back SILENTLY.
      - name: firecrawl MCP auto-spin (flag tracks reality · fallback is narrated · config never corrupted)
        run: bash tests/firecrawl-selftest.sh
      # WHICH specs get debated is a spend policy: too narrow misses defects, too wide bills a paid
      # cross-model dialogue per spec per run. Both directions are pinned.
      - name: debate eligibility (HIGH-risk + user-facing · exclusions · knobs · skips narrated)
        run: bash tests/debate-eligibility-selftest.sh
      # A denial page served with HTTP 200 + success=true is indistinguishable from content to every layer
      # downstream. Pins the classifier, its precision, and that the agents are told.
      - name: research honesty (denial pages · citation precision · agent rules)
        run: bash tests/research-honesty-selftest.sh
      # `ace start`'s defaults (self-merge, both debates, cited-URL verification) are an OWNER-SIGNED-OFF
      # policy: they decide what reaches main unattended and what a run costs. Each is pinned BY VALUE, so a
      # drift is a build failure rather than something noticed after a run has already merged.
      - name: run lifecycle (ace start policy defaults · precedence · double-start · ace stop covers both flows)
        run: bash tests/lifecycle-selftest.sh
      # Folding four reports into one surface is only safe if the OLD forms survive byte-for-byte: people have
      # `ace stats global` in scripts, and a new section name silently swallowing it is a regression with no
      # error message. Both halves — the sections and the back-compat — are pinned.
      - name: stats surface (4 sections · single-section filter · legacy args intact · sections isolated)
        run: bash tests/statsall-selftest.sh
      # `ace arch` draws ANSI-coloured ASCII panels. Escapes have zero display width but count as characters,
      # and emoji are the reverse — one character, two columns. Both make a panel silently ragged, so the
      # widths are asserted in DISPLAY COLUMNS, with colour on and off. Also pins the menu<->dispatch numbering.
      - name: architecture view (panels column-aligned · no double-width glyphs · menu matches dispatch arms)
        run: bash tests/architecture-selftest.sh
